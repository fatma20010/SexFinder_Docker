server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Large BAM/FASTQ (must match Flask MAX_CONTENT_LENGTH; e.g. 20+ GB BAMs exceed old 12G limit)
    client_max_body_size 40G;
    # client_body_in_file_only writes upload chunks here — MUST be bind-mounted (see docker-compose)
    # or the container overlay grows by tens of GB per large upload.
    client_body_temp_path /var/nginx/client-body 1 2;
    client_body_timeout 7200s;
    send_timeout 7200s;
    keepalive_timeout 7200s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Receive full upload to disk first, then forward to Flask — fewer mid-stream resets on large BAM/FASTQ.
        client_body_in_file_only clean;
        client_body_buffer_size 512k;
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
        proxy_connect_timeout 7200s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_request_buffering on;
        proxy_buffering off;
    }

    # Enable CORS
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
    add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
}




